<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FIRE CODE</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.view{display:none;padding:24px 20px;animation:fadeIn .3s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Entry View */
.entry-logo{text-align:center;padding:60px 0 40px}
.entry-logo h1{font-size:42px;font-weight:800;letter-spacing:6px;background:linear-gradient(135deg,#00ffcc,#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.entry-logo p{color:#666;font-size:13px;margin-top:8px;letter-spacing:2px}
.entry-subtitle{text-align:center;color:#aaa;font-size:14px;margin-bottom:50px;line-height:2}
.entry-btns{display:flex;flex-direction:column;gap:16px;padding:0 20px}
.entry-btn{background:#15151f;border:1px solid #333;border-radius:12px;padding:20px;color:#fff;text-align:center;cursor:pointer;transition:all .2s}
.entry-btn:active{border-color:#00ffcc;transform:scale(.98)}
.entry-btn .title{font-size:16px;font-weight:600}
.entry-btn .desc{font-size:12px;color:#666;margin-top:6px}

/* Step View */
.step-progress{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}
.step-bar{flex:1;height:3px;background:#222;border-radius:2px;margin:0 12px;overflow:hidden}
.step-bar-fill{height:100%;background:linear-gradient(90deg,#00ffcc,#00aaff);transition:width .3s}
.step-count{font-size:12px;color:#666;white-space:nowrap}
.step-question{font-size:20px;font-weight:600;margin-bottom:8px}
.step-hint{font-size:12px;color:#666;margin-bottom:24px;min-height:18px}
.step-nav{display:flex;gap:12px;margin-top:30px}
.step-nav button{flex:1}

/* Form Controls */
.form-group{margin-bottom:20px}
.form-label{font-size:14px;color:#aaa;margin-bottom:8px;display:block}
.form-hint{font-size:11px;color:#555;margin-top:6px;line-height:1.5}
.slider-row{display:flex;align-items:center;gap:12px}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:#222;border-radius:2px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#00ffcc;border-radius:50%;cursor:pointer;box-shadow:0 0 8px rgba(0,255,204,.4)}
.slider-row input[type=range]::-moz-range-thumb{width:20px;height:20px;background:#00ffcc;border-radius:50%;cursor:pointer;border:none}
.num-input{background:#15151f;border:1px solid #333;border-radius:8px;color:#fff;padding:10px 14px;font-size:16px;width:100px;text-align:center;outline:none}
.num-input:focus{border-color:#00ffcc}
.num-unit{color:#666;font-size:13px;white-space:nowrap}
.input-row{display:flex;align-items:center;gap:8px}

/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:12px}
.toggle{position:relative;width:48px;height:26px;background:#222;border-radius:13px;cursor:pointer;transition:background .2s}
.toggle.on{background:#00ffcc}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(22px);background:#0a0a0f}
.toggle-label{font-size:14px;color:#aaa}

/* Quick View */
.quick-title{font-size:22px;font-weight:700;margin-bottom:6px}
.quick-sub{font-size:12px;color:#666;margin-bottom:24px}

/* Buttons */
.btn{background:#00ffcc;color:#0a0a0f;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;width:100%}
.btn:active{transform:scale(.98)}
.btn-outline{background:transparent;border:1px solid #333;color:#aaa}
.btn-outline:active{border-color:#00ffcc;color:#00ffcc}

/* Result View */
.result-hero{text-align:center;padding:30px 0 20px}
.result-hero .label{font-size:12px;color:#666;letter-spacing:3px}
.result-hero .value{font-size:48px;font-weight:800;background:linear-gradient(135deg,#00ffcc,#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:8px 0}
.result-hero .unit{font-size:14px;color:#666}
.result-summary{background:#15151f;border:1px solid #222;border-radius:12px;padding:16px;margin:20px 0}
.result-summary .row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.result-summary .row span:first-child{color:#666}
.result-summary .row span:last-child{color:#fff}

/* Result Table with bar chart */
.result-table{background:#15151f;border:1px solid #222;border-radius:12px;overflow:hidden;margin:20px 0}
.result-table .th{display:flex;background:#1a1a25;padding:10px 12px;font-size:11px;color:#666;border-bottom:1px solid #222}
.result-table .th .td{position:relative}
.result-table .th .sub-note{font-size:9px;color:#444;display:block;font-weight:normal;margin-top:2px}
.result-table .tr{display:flex;padding:10px 12px;font-size:12px;border-bottom:1px solid #1a1a25;align-items:center}
.result-table .tr:last-child{border-bottom:none}
.result-table .td{flex:1;text-align:center;position:relative}
.result-table .td:first-child{text-align:left;color:#666;flex:0.6}
.result-table .td .bar-bg{width:100%;height:6px;background:#1a1a25;border-radius:3px;margin-top:4px;overflow:hidden}
.result-table .td .bar-fill{height:100%;border-radius:3px}
.result-table .td .bar-spend{background:#ff6b6b}
.result-table .td .bar-principal{background:#00ffcc}
.result-table .td:nth-child(2){color:#ff6b6b}
.result-table .td:nth-child(3){color:#00ffcc}

/* Collapsible segment */
.segment-toggle{background:#1a1a25;padding:10px 12px;font-size:11px;color:#666;cursor:pointer;text-align:center;border-bottom:1px solid #222}
.segment-toggle:active{color:#00ffcc}
.segment-collapsed{display:none}

.result-actions{display:flex;gap:12px;margin-top:24px}
.result-actions button{flex:1}

/* Share image hidden */
.share-img{position:fixed;left:-9999px;top:0;width:300px;height:300px;background:#0a0a0f;display:flex;align-items:center;justify-content:center}
.share-img span{font-size:36px;font-weight:800;letter-spacing:6px;background:linear-gradient(135deg,#00ffcc,#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Collapsible summary */
.collapse-toggle{font-size:12px;color:#666;cursor:pointer;text-align:center;padding:8px}
.collapse-toggle:active{color:#00ffcc}
.collapsed{display:none}

/* Responsive */
@media(max-width:380px){.entry-logo h1{font-size:34px}.result-hero .value{font-size:40px}}
</style>
</head>
<body>
<div id="app">

<!-- 入口页 -->
<div class="view active" id="entry-view">
  <div class="entry-logo">
    <h1>FIRE CODE</h1>
    <p>求解自由的距离</p>
  </div>
  <div class="entry-subtitle">
    Financial Independence, Retire Early<br>
    倒推法计算你的FIRE本金
  </div>
  <div class="entry-btns">
    <div class="entry-btn" onclick="goStep()">
      <div class="title">按步骤，每个问题逐步填写</div>
      <div class="desc">一步步引导，轻松完成</div>
    </div>
    <div class="entry-btn" onclick="goQuick()">
      <div class="title">不啰嗦，框架式直填计算</div>
      <div class="desc">一页填完，立即出结果</div>
    </div>
  </div>
</div>

<!-- 分步填写 -->
<div class="view" id="step-view">
  <div class="step-progress">
    <span class="step-count" id="stepCount">1/9</span>
    <div class="step-bar"><div class="step-bar-fill" id="stepBar"></div></div>
    <span class="step-count" id="stepTotal">9</span>
  </div>
  <div id="stepContent"></div>
  <div class="step-nav">
    <button class="btn btn-outline" id="stepPrev" onclick="stepPrev()">上一步</button>
    <button class="btn" id="stepNext" onclick="stepNext()">下一步</button>
  </div>
</div>

<!-- 一页式填写 -->
<div class="view" id="quick-view">
  <div class="quick-title">参数填写</div>
  <div class="quick-sub">填完点击计算，立即求解你的FIRE本金</div>
  <div id="quickContent"></div>
  <button class="btn" style="margin-top:20px" onclick="calculate()">计算</button>
</div>

<!-- 结果页 -->
<div class="view" id="result-view">
  <div id="resultCapture">
    <div class="result-hero">
      <div class="label">YOUR FIRE CODE</div>
      <div class="value" id="resultZ">—</div>
      <div class="unit">万元</div>
    </div>
    <div class="result-summary" id="resultSummary"></div>
    <div class="result-table" id="resultTable"></div>
    <div style="text-align:center;padding:20px 0 8px;font-size:12px;color:#444;letter-spacing:2px">郑大钱 出品</div>
  </div>
  <div class="result-actions">
    <button class="btn btn-outline" onclick="exportImg()">导出图片</button>
    <button class="btn" onclick="recalc()">重新计算</button>
  </div>
</div>

<!-- 分享配图 -->
<div class="share-img" id="shareImg"><span>FIRE CODE</span></div>

</div>

<script>
// ===== 数据模型 =====
var data = {
  age: 30,
  fireAge: 45,
  retireAge: 60,
  lifeExp: 85,
  annualSpend: 15,
  returnRate: 7,
  inflation: 2.5,
  keepPrincipal: false,
  principalAmt: 100
};

var steps = [
  {key:'age', label:'你的当前年龄', unit:'岁', min:18, max:80, step:1, hint:''},
  {key:'fireAge', label:'希望FIRE的年龄', unit:'岁', min:'age', max:75, step:1, hint:''},
  {key:'retireAge', label:'可以领取退休金的年龄', unit:'岁', min:'age', max:80, step:1, hint:''},
  {key:'lifeExp', label:'预期寿命', unit:'岁', min:'retireAge', max:120, step:1, hint:''},
  {key:'annualSpend', label:'FIRE后每年支出费用', unit:'万元', min:1, max:200, step:1, hint:''},
  {key:'returnRate', label:'预期年化收益率', unit:'%', min:0, max:30, step:0.1, hint:'当前银行3年期定存利率约1.25%'},
  {key:'inflation', label:'预期通货膨胀率', unit:'%', min:0, max:20, step:0.1, hint:'近10年平均通胀率约1.9%，近15年约2.2%，实际通货膨胀率可能高于上述参考值'},
  {key:'keepPrincipal', label:'退休时是否保留一笔本金', type:'toggle', hint:''},
  {key:'principalAmt', label:'保留本金金额', unit:'万元', min:0, max:5000, step:10, hint:'', cond:'keepPrincipal'}
];

var stepIdx = 0;
var lastSchedule = [];

// ===== 导航 =====
function showView(id){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  document.getElementById(id).classList.add('active');
}
function goStep(){stepIdx=0;renderStep();showView('step-view')}
function goQuick(){renderQuick();showView('quick-view')}

// ===== 辅助 =====
function getVal(v){
  if(typeof v==='string'&&data[v]!==undefined)return data[v];
  return v;
}

// ===== 分步模式 =====
function renderStep(){
  var s = steps[stepIdx];
  if(s.cond && !data[s.cond]){
    stepIdx++;
    if(stepIdx<steps.length){renderStep();return}
    else{calculate();return}
  }
  if(stepIdx>=steps.length){calculate();return}
  
  // 动态计算步数（排除隐藏的cond项）
  var visibleSteps = steps.filter(function(st){return !st.cond || data[st.cond]});
  var visibleIdx = visibleSteps.indexOf(s);
  
  document.getElementById('stepCount').textContent=(visibleIdx+1)+'/'+visibleSteps.length;
  document.getElementById('stepTotal').textContent=visibleSteps.length;
  document.getElementById('stepBar').style.width=((visibleIdx+1)/visibleSteps.length*100)+'%';
  
  var prevBtn=document.getElementById('stepPrev');
  prevBtn.style.visibility=visibleIdx===0?'hidden':'visible';
  document.getElementById('stepNext').textContent=visibleIdx===visibleSteps.length-1?'计算':'下一步';
  
  var min=getVal(s.min),max=getVal(s.max);
  var c='';
  
  if(s.type==='toggle'){
    c+='<div class="step-question">'+s.label+'</div>';
    c+='<div class="step-hint">'+(s.hint||'')+'</div>';
    c+='<div class="toggle-wrap"><div class="toggle'+(data[s.key]?' on':'')+'" id="stepToggle" onclick="stepToggle()"></div><span class="toggle-label" id="stepToggleLabel">'+(data[s.key]?'是':'否')+'</span></div>';
    // 如果选"是"且当前是keepPrincipal，显示金额输入
    if(data[s.key] && s.key==='keepPrincipal'){
      var pStep=steps[steps.length-1];
      c+='<div id="stepExtra" style="margin-top:20px;animation:fadeIn .3s ease">';
      c+='<div class="form-label">'+pStep.label+'</div>';
      c+='<div class="slider-row"><input type="range" id="stepRange2" min="'+getVal(pStep.min)+'" max="'+getVal(pStep.max)+'" step="'+pStep.step+'" value="'+data.principalAmt+'" oninput="syncStepExtra(this.value)"></div>';
      c+='<div class="input-row" style="margin-top:12px;justify-content:center"><input type="number" class="num-input" id="stepNum2" min="'+getVal(pStep.min)+'" max="'+getVal(pStep.max)+'" step="'+pStep.step+'" value="'+data.principalAmt+'" oninput="syncStepExtra(this.value)"><span class="num-unit">'+pStep.unit+'</span></div>';
      c+='</div>';
    }
  }else{
    c+='<div class="step-question">'+s.label+'</div>';
    c+='<div class="step-hint">'+(s.hint||'')+'</div>';
    c+='<div class="slider-row"><input type="range" id="stepRange" min="'+min+'" max="'+max+'" step="'+s.step+'" value="'+data[s.key]+'" oninput="syncStep(this.value)"></div>';
    c+='<div class="input-row" style="margin-top:12px;justify-content:center"><input type="number" class="num-input" id="stepNum" min="'+min+'" max="'+max+'" step="'+s.step+'" value="'+data[s.key]+'" oninput="syncStep(this.value)"><span class="num-unit">'+s.unit+'</span></div>';
  }
  document.getElementById('stepContent').innerHTML=c;
}

function stepToggle(){
  var t=document.getElementById('stepToggle');
  var isOn=!t.classList.contains('on');
  t.classList.toggle('on');
  data.keepPrincipal=isOn;
  document.getElementById('stepToggleLabel').textContent=isOn?'是':'否';
  // 重新渲染以显示/隐藏金额输入
  renderStep();
}

function syncStep(v){
  var s=steps[stepIdx];
  v=parseFloat(v);
  if(isNaN(v))return;
  data[s.key]=v;
  var r=document.getElementById('stepRange'),n=document.getElementById('stepNum');
  if(r&&r.value!=v)r.value=v;
  if(n&&n.value!=v)n.value=v;
}

function syncStepExtra(v){
  v=parseFloat(v);
  if(isNaN(v))return;
  data.principalAmt=v;
  var r=document.getElementById('stepRange2'),n=document.getElementById('stepNum2');
  if(r&&r.value!=v)r.value=v;
  if(n&&n.value!=v)n.value=v;
}

function stepNext(){
  var s=steps[stepIdx];
  if(s.type==='toggle'){
    var t=document.getElementById('stepToggle');
    data[s.key]=t.classList.contains('on');
  }
  stepIdx++;
  // 跳过cond项（已在toggle页内填写）
  while(stepIdx<steps.length&&steps[stepIdx].cond)stepIdx++;
  if(stepIdx>=steps.length){calculate();return}
  renderStep();
}
function stepPrev(){
  stepIdx--;
  while(stepIdx>=0&&steps[stepIdx].cond)stepIdx--;
  if(stepIdx<0)stepIdx=0;
  renderStep();
}

// ===== 一页式模式 =====
function renderQuick(){
  var c='';
  steps.forEach(function(s,idx){
    if(s.cond&&!data[s.cond])return;
    var min=getVal(s.min),max=getVal(s.max);
    if(s.type==='toggle'){
      c+='<div class="form-group" id="fg-'+s.key+'">';
      c+='<label class="form-label">'+s.label+'</label>';
      c+='<div class="toggle-wrap"><div class="toggle'+(data[s.key]?' on':'')+'" onclick="quickToggle()"></div><span class="toggle-label" id="quickToggleLabel">'+(data[s.key]?'是':'否')+'</span></div>';
      c+='</div>';
    }else{
      c+='<div class="form-group" id="fg-'+s.key+'">';
      c+='<label class="form-label">'+s.label+'</label>';
      var sliderId='qslider-'+s.key;
      var numId='qnum-'+s.key;
      c+='<div class="slider-row"><input type="range" id="'+sliderId+'" min="'+min+'" max="'+max+'" step="'+s.step+'" value="'+data[s.key]+'" oninput="quickSync(\''+s.key+'\',this.value,\''+sliderId+'\',\''+numId+'\')"><input type="number" class="num-input" id="'+numId+'" min="'+min+'" max="'+max+'" step="'+s.step+'" value="'+data[s.key]+'" oninput="quickSync(\''+s.key+'\',this.value,\''+sliderId+'\',\''+numId+'\')"><span class="num-unit">'+s.unit+'</span></div>';
      if(s.hint)c+='<div class="form-hint">'+s.hint+'</div>';
      c+='</div>';
    }
  });
  document.getElementById('quickContent').innerHTML=c;
}

function quickToggle(){
  data.keepPrincipal=!data.keepPrincipal;
  renderQuick();
}

function quickSync(key,val,sliderId,numId){
  val=parseFloat(val);
  if(isNaN(val))return;
  data[key]=val;
  var s=document.getElementById(sliderId);
  var n=document.getElementById(numId);
  if(s&&s.value!=val)s.value=val;
  if(n&&n.value!=val)n.value=val;
}

// ===== 计算 =====
function calculate(){
  var X1=data.annualSpend;
  var Y1=data.inflation/100;
  var Y2=data.returnRate/100;
  var A=data.retireAge-data.fireAge;
  var X=data.keepPrincipal?data.principalAmt:0;
  
  if(A<=0){
    document.getElementById('resultZ').textContent='参数异常';
    showView('result-view');
    return;
  }
  
  var r=(1+Y1)/(1+Y2);
  var Z;
  if(Math.abs(Y2-Y1)<0.0001){
    Z=X/Math.pow(1+Y2,A)+X1*A;
  }else{
    Z=X/Math.pow(1+Y2,A)+X1*(1-Math.pow(r,A))/(1-r);
  }
  
  // 逐年模拟
  var schedule=[];
  var principal=Z;
  for(var i=0;i<A;i++){
    var spending=X1*Math.pow(1+Y1,i);
    principal-=spending;
    principal*=(1+Y2);
    schedule.push({year:i+1,spending:spending,end:principal});
  }
  lastSchedule=schedule;
  
  // 找最大值用于条形图比例
  var maxSpend=schedule[0].spending, maxPrincipal=Z;
  for(var i=0;i<schedule.length;i++){
    if(schedule[i].spending>maxSpend)maxSpend=schedule[i].spending;
    if(schedule[i].end>maxPrincipal)maxPrincipal=schedule[i].end;
  }
  
  // 渲染结果
  document.getElementById('resultZ').textContent=Math.round(Z).toLocaleString();
  
  var summary='<div class="collapse-toggle" onclick="this.nextElementSibling.classList.toggle(\'collapsed\')">参数摘要 ▼</div>';
  summary+='<div>';
  summary+='<div class="row"><span>当前年龄</span><span>'+data.age+' 岁</span></div>';
  summary+='<div class="row"><span>FIRE年龄</span><span>'+data.fireAge+' 岁</span></div>';
  summary+='<div class="row"><span>领退休金年龄</span><span>'+data.retireAge+' 岁</span></div>';
  summary+='<div class="row"><span>预期寿命</span><span>'+data.lifeExp+' 岁</span></div>';
  summary+='<div class="row"><span>FIRE后年支出</span><span>'+data.annualSpend+' 万</span></div>';
  summary+='<div class="row"><span>年化收益率</span><span>'+data.returnRate+'%</span></div>';
  summary+='<div class="row"><span>通胀率</span><span>'+data.inflation+'%</span></div>';
  summary+='<div class="row"><span>本金消耗年数</span><span>'+A+' 年</span></div>';
  if(data.keepPrincipal)summary+='<div class="row"><span>保留本金</span><span>'+data.principalAmt+' 万</span></div>';
  summary+='</div>';
  summary+='<div style="font-size:10px;color:#444;line-height:1.8;margin-top:12px;padding-top:12px;border-top:1px solid #1a1a25">';
  summary+='核算前提为没有债务，所有资产均指现金资产<br>';
  summary+='除自住房以外的不动产或其他资产请折合成现金资产计算<br>';
  summary+='退休后不再核算年支出，默认由养老金或退休时保留本金全额覆盖';
  summary+='</div>';
  document.getElementById('resultSummary').innerHTML=summary;
  
  // 表格 - 带条形图 + 分段折叠
  var tbl='<div class="th"><div class="td">年份</div><div class="td">当年支出(万)<span class="sub-note">支出随通胀率增长</span></div><div class="td">年末本金(万)<span class="sub-note">剩余本金按收益率继续增值</span></div></div>';
  
  // 全部展开/折叠按钮（仅分段模式）
  if(schedule.length>10){
    tbl+='<div id="exportBtnBar" style="display:flex;gap:8px;padding:8px 12px;background:#1a1a25;border-bottom:1px solid #222"><button class="btn-outline" style="flex:1;padding:8px;font-size:12px;border-radius:8px;border:1px solid #333;color:#aaa;background:transparent" onclick="expandAll()">全部展开</button><button class="btn-outline" style="flex:1;padding:8px;font-size:12px;border-radius:8px;border:1px solid #333;color:#aaa;background:transparent" onclick="collapseAll()">全部折叠</button></div>';
  }
  
  if(schedule.length<=10){
    // 不分段，全部显示
    schedule.forEach(function(r){
      var spendPct=Math.round(r.spending/maxSpend*100);
      var principalPct=Math.round(r.end/maxPrincipal*100);
      tbl+='<div class="tr"><div class="td">第'+r.year+'年</div>';
      tbl+='<div class="td">'+r.spending.toFixed(2)+'<div class="bar-bg"><div class="bar-fill bar-spend" style="width:'+spendPct+'%"></div></div></div>';
      tbl+='<div class="td">'+r.end.toFixed(2)+'<div class="bar-bg"><div class="bar-fill bar-principal" style="width:'+principalPct+'%"></div></div></div>';
      tbl+='</div>';
    });
  }else{
    // 分10段，每段折叠
    var segCount=10;
    var segSize=Math.ceil(schedule.length/segCount);
    for(var seg=0;seg<segCount;seg++){
      var startIdx=seg*segSize;
      var endIdx=Math.min(startIdx+segSize,schedule.length);
      if(startIdx>=schedule.length)break;
      
      var segStartYear=schedule[startIdx].year;
      var segEndYear=schedule[endIdx-1].year;      
      // 段标题
      tbl+='<div class="segment-toggle" onclick="toggleSegment('+seg+')">第'+segStartYear+'年 - 第'+segEndYear+'年 ▼</div>';
      tbl+='<div id="seg-'+seg+'" >';
      
      for(var i=startIdx;i<endIdx;i++){
        var r=schedule[i];
        var spendPct=Math.round(r.spending/maxSpend*100);
        var principalPct=Math.round(r.end/maxPrincipal*100);
        tbl+='<div class="tr"><div class="td">第'+r.year+'年</div>';
        tbl+='<div class="td">'+r.spending.toFixed(2)+'<div class="bar-bg"><div class="bar-fill bar-spend" style="width:'+spendPct+'%"></div></div></div>';
        tbl+='<div class="td">'+r.end.toFixed(2)+'<div class="bar-bg"><div class="bar-fill bar-principal" style="width:'+principalPct+'%"></div></div></div>';
        tbl+='</div>';
      }
      tbl+='</div>';
    }
  }
  document.getElementById('resultTable').innerHTML=tbl;
  
  showView('result-view');
}

function toggleSegment(seg){
  var el=document.getElementById('seg-'+seg);
  el.classList.toggle('segment-collapsed');
}
function expandAll(){
  document.querySelectorAll('[id^=seg-]').forEach(function(el){el.classList.remove('segment-collapsed')});
}
function collapseAll(){
  document.querySelectorAll('[id^=seg-]').forEach(function(el){el.classList.add('segment-collapsed')});
}

// ===== 重新计算 =====
function recalc(){
  renderQuick();
  showView('quick-view');
}

// ===== 导出图片 =====
function exportImg(){
  // 展开所有折叠段
  document.querySelectorAll('.segment-collapsed').forEach(function(el){el.classList.remove('segment-collapsed')});
  // 展开参数摘要
  var summaryDiv=document.querySelector('#resultSummary .collapsed');
  if(summaryDiv)summaryDiv.classList.remove('collapsed');
  // 隐藏全部展开/折叠按钮
  var btnBar=document.getElementById('exportBtnBar');
  if(btnBar)btnBar.style.display='none';
  setTimeout(function(){
    var node=document.getElementById('resultCapture');
    html2canvas(node,{backgroundColor:'#0a0a0f',scale:2}).then(function(canvas){
      var link=document.createElement('a');
      link.download='fire-code.png';
      link.href=canvas.toDataURL('image/png');
      link.click();
      // 恢复按钮显示
      if(btnBar)btnBar.style.display='flex';
    });
  },200);
}

// ===== 初始化 =====
renderQuick();
</script>
</body>
</html>
